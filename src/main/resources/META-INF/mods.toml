[[mods]]
    modId="nuclearmeltdownaddon"
    version="1.0.0"
    displayName="Nuclear Meltdown Addon"
    displayTest="IGNORE_SERVER_VERSION"
    description='''
        Replaces the Mekanism fission reactor meltdown with a realistic nuclear bomb explosion:
        a massive central blast, continuous expanding shockwave rings out to 200 blocks,
        scaled entity damage up to 300 blocks away, and fire spread across 200 blocks.
        Server-side only — clients do not need this installed.
    '''

