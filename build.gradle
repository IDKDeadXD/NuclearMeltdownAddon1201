plugins {
    id 'java'
    id 'net.neoforged.gradle' version '[6.0.18,6.2)'
}

version = "${mod_version}"
group = 'com.example.nuclearmeltdown'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

minecraft {
    // Use official (Mojang) mappings — no parchment dependency needed for the addon.
    mappings channel: 'official', version: '1.20.1'

    runs {
        server {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'debug'
            mods {
                nuclearmeltdownaddon { source sourceSets.main }
            }
        }
    }
}

dependencies {
    minecraft 'net.neoforged:forge:1.20.1-47.1.76'

    // Compile against the all-in-one Mekanism JAR built from Mekanism1201/.
    // Run `gradlew.bat build` inside Mekanism1201 first to produce this file.
    compileOnly fg.deobf(files('../Mekanism1201/build/libs/Mekanism-1.20.1-10.4.16.homebaked-all.jar'))
}
